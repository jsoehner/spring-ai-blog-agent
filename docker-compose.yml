version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  supervisor-agent:
    build: .
    image: jsoehner/spring-ai-agent:latest
    ports:
      - "8081:8080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SPRING_PROFILES_ACTIVE=supervisor
      - SPRING_RABBITMQ_HOST=rabbitmq
      - RESEARCHER_URL=http://researcher-agent:8080/research
      - IMAGE_AGENT_URL=http://image-agent:8080/image
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config
      - ./.git:/app/.git

  researcher-agent:
    build: .
    image: jsoehner/spring-ai-agent:latest
    environment:
      - SPRING_PROFILES_ACTIVE=researcher
      - SPRING_RABBITMQ_HOST=rabbitmq
      - IMAGE_AGENT_URL=http://image-agent:8080/image
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config

  image-agent:
    build: .
    image: jsoehner/spring-ai-agent:latest
    environment:
      - SPRING_PROFILES_ACTIVE=image-agent
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config
