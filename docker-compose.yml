version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    read_only: true
    tmpfs:
      - /var/lib/rabbitmq
      - /var/log/rabbitmq
      - /tmp
    security_opt:
      - no-new-privileges:true

  supervisor-agent:
    build: .
    image: ghcr.io/jsoehner/spring-ai-blog-agent:latest
    ports:
      - "8081:8080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SPRING_PROFILES_ACTIVE=supervisor
      - SPRING_RABBITMQ_HOST=rabbitmq
      - RESEARCHER_URL=http://researcher-agent:8080/research
      - IMAGE_AGENT_URL=http://image-agent:8080/image
      - SPRING_AI_OLLAMA_BASE_URL=http://192.168.100.190:11434
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - SPRING_AI_OPENAI_API_KEY=dummy
      - OPA_URL=http://opa:8181/v1/data/agent/main
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config
      - ./.git:/app/.git
      - ./request-activity.log:/app/request-activity.log
      - ./output:/app/output
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  issue-agent:
    build: .
    image: ghcr.io/jsoehner/spring-ai-blog-agent:latest
    ports:
      - "8082:8080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SPRING_PROFILES_ACTIVE=issue-agent
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_AI_OLLAMA_BASE_URL=http://192.168.100.190:11434
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - SPRING_AI_OPENAI_API_KEY=dummy
      - OPA_URL=http://opa:8181/v1/data/agent/main
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config
      - ./.git:/app/.git
      - ./src:/app/src
      - ./build.gradle:/app/build.gradle
      - ./settings.gradle:/app/settings.gradle
      - ./request-activity.log:/app/request-activity.log
      - ./output:/app/output
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  researcher-agent:
    build: .
    image: ghcr.io/jsoehner/spring-ai-blog-agent:latest
    environment:
      - SPRING_PROFILES_ACTIVE=researcher
      - SPRING_RABBITMQ_HOST=rabbitmq
      - IMAGE_AGENT_URL=http://image-agent:8080/image
      - SPRING_AI_OLLAMA_BASE_URL=http://192.168.100.190:11434
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - SPRING_AI_OPENAI_API_KEY=dummy
      - OPA_URL=http://opa:8181/v1/data/agent/main
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config
      - ./request-activity.log:/app/request-activity.log
      - ./output:/app/output
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  image-agent:
    build: .
    image: ghcr.io/jsoehner/spring-ai-blog-agent:latest
    environment:
      - SPRING_PROFILES_ACTIVE=image-agent
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_AI_OLLAMA_BASE_URL=http://192.168.100.190:11434
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - SPRING_AI_OPENAI_API_KEY=dummy
      - OPA_URL=http://opa:8181/v1/data/agent/main
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config
      - ./request-activity.log:/app/request-activity.log
      - ./output:/app/output
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  opa:
    image: openpolicyagent/opa:latest-debug
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--log-level=debug"
      - "--v0-compatible"
      - "/policies"
    volumes:
      - ./security-policies/opa-guardrails/data/config.json:/policies/config.json
      - ./security-policies/opa-guardrails/policies:/policies/policies
      - ./policy.rego:/policies/policy.rego
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/tmp/prometheus'
    read_only: true
    tmpfs:
      - /prometheus
      - /tmp
    security_opt:
      - no-new-privileges:true
