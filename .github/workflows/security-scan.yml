name: Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        id: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ARGS: "detect --report-path=gitleaks-report.json --report-format=json --redact --verbose"

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 1

  semgrep:
    name: SAST Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: SAST Scanning (Semgrep)
        id: semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep scan --config auto --json -o semgrep-results.json

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 1

  trivy:
    name: Dependency SCA Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Container & FS Scanning (Trivy)
        id: trivy
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        continue-on-error: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 1

  reporting:
    name: Compile Findings & Dispatch
    needs: [gitleaks, semgrep, trivy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Download Gitleaks Report
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: gitleaks-report

      - name: Download Semgrep Report
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: semgrep-results

      - name: Download Trivy Report
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        continue-on-error: true
        with:
          name: trivy-results

      - name: Parse scan reports
        run: node .github/scripts/parse-findings.js

      - name: Check for findings
        id: check-findings
        run: |
          if [ -f findings-table.md ]; then
            echo "has_findings=true" >> $GITHUB_OUTPUT
            echo "Findings detected!"
          else
            echo "has_findings=false" >> $GITHUB_OUTPUT
            echo "No findings detected."
          fi

      - name: Notify on security findings
        if: ${{ steps.check-findings.outputs.has_findings == 'true' || needs.gitleaks.result == 'failure' || needs.semgrep.result == 'failure' || needs.trivy.result == 'failure' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            
            let body = `The security scan workflow detected potential findings in the codebase.\n\n`;
            body += `Please review the workflow run logs for details: https://github.com/${owner}/${repo}/actions/runs/${runId}\n\n`;
            
            if (fs.existsSync('findings-table.md')) {
              body += fs.readFileSync('findings-table.md', 'utf8');
            } else {
              body += `**Failed Scan Jobs:**\n`;
              if ('${{ needs.gitleaks.result }}' === 'failure') body += `- Secret Scanning (Gitleaks) failed/errored\n`;
              if ('${{ needs.semgrep.result }}' === 'failure') body += `- SAST Scanning (Semgrep) failed/errored\n`;
              if ('${{ needs.trivy.result }}' === 'failure') body += `- Container & FS Scanning (Trivy) failed/errored\n`;
            }
            
            await github.rest.issues.create({
              owner,
              repo,
              title: 'Security Scan: Findings Detected',
              body: body,
              assignees: ['jsoehner'],
              labels: ['security', 'automated-scan']
            });

            // Trigger Automated Dependency Update
            console.log('Triggering automated dependency update workflow...');
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: 'nightly-dependency-update.yml',
                ref: context.ref || 'main'
              });
              console.log('Successfully triggered dependency update workflow.');
            } catch (error) {
              console.error('Failed to trigger dependency update workflow:', error);
            }
