name: Nightly Dependency Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Configure Git for automated commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Update dependencies
        run: |
          python3 .github/scripts/update-dependencies.py

      - name: Build and Verify
        run: |
          cp src/main/resources/application.properties.template src/main/resources/application.properties || true
          ./gradlew clean build

      - name: Clean generated artifacts from branch
        run: |
          git rm -r --cached build .gradle || true
          git status --short

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        continue-on-error: true
        env:
          PR_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          token: ${{ env.PR_TOKEN || github.token }}
          commit-message: "chore(deps): update project dependencies"
          title: "Automated Dependency Update"
          body: |
            This PR contains automated dependency updates generated by the nightly workflow.
            The dependencies were updated, and a successful build/test was triggered.
          branch: "automated/dependency-updates"
          delete-branch: true
          assignees: "jsoehner"
          reviewers: "jsoehner"
          labels: "automated-dependency-update"

      - name: Notify manual PR approval needed
        if: ${{ always() && steps.create-pr.outcome == 'failure' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: 'Automated dependency branch ready for manual PR',
              body: `The automated dependency branch passed build verification but PR creation was blocked by repository policy.\n\nBranch: https://github.com/${owner}/${repo}/tree/automated/dependency-updates\n\nRequested reviewer: @jsoehner`,
              assignees: ['jsoehner'],
              labels: ['dependency-update']
            });
